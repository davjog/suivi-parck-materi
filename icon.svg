<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#2e7d32"/>
  <!-- Tractor body -->
  <rect x="140" y="220" width="180" height="110" rx="12" fill="#fff" opacity="0.95"/>
  <!-- Cab -->
  <rect x="240" y="160" width="100" height="80" rx="10" fill="#fff" opacity="0.95"/>
  <!-- Cab window -->
  <rect x="252" y="172" width="76" height="52" rx="6" fill="#2e7d32"/>
  <!-- Exhaust -->
  <rect x="318" y="130" width="12" height="46" rx="4" fill="#fff" opacity="0.8"/>
  <!-- Large rear wheel -->
  <circle cx="196" cy="330" r="72" fill="#1b5e20"/>
  <circle cx="196" cy="330" r="52" fill="#2e7d32"/>
  <circle cx="196" cy="330" r="18" fill="#fff" opacity="0.9"/>
  <!-- Spokes rear -->
  <line x1="196" y1="278" x2="196" y2="382" stroke="#fff" stroke-width="8" opacity="0.5"/>
  <line x1="144" y1="330" x2="248" y2="330" stroke="#fff" stroke-width="8" opacity="0.5"/>
  <line x1="160" y1="294" x2="232" y2="366" stroke="#fff" stroke-width="8" opacity="0.5"/>
  <line x1="232" y1="294" x2="160" y2="366" stroke="#fff" stroke-width="8" opacity="0.5"/>
  <!-- Small front wheel -->
  <circle cx="340" cy="340" r="44" fill="#1b5e20"/>
  <circle cx="340" cy="340" r="30" fill="#2e7d32"/>
  <circle cx="340" cy="340" r="10" fill="#fff" opacity="0.9"/>
  <!-- Hitch -->
  <rect x="108" y="295" width="36" height="16" rx="4" fill="#fff" opacity="0.7"/>
  <!-- Wrench accent (bottom right) -->
  <circle cx="390" cy="160" r="44" fill="#558b2f" opacity="0.85"/>
  <text x="390" y="176" font-size="44" text-anchor="middle" fill="#fff" font-family="sans-serif">🔧</text>
</svg>
